name: test-and-build

on: [push]

jobs:
  test:
    defaults:
      run:
        shell: sh

    container:
      image: ghcr.io/luzifer-docker/action-env:master@sha256:f399deee9a81684105f77ed8789cf72bb42eee9b4849980748f0bf695ee0f78f
      env:
        CGO_ENABLED: 0
        GOPATH: /go

    runs-on: forgejo

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Test code
        run: make test
