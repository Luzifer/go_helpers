name: test-and-build

on: [push]

jobs:
  test:
    defaults:
      run:
        shell: sh

    container:
      image: ghcr.io/luzifer-docker/action-env:master@sha256:a4b8741053e93c16e234837e035cfff48ee87eecbc6556917239232c41524f40
      env:
        CGO_ENABLED: 0
        GOPATH: /go

    runs-on: forgejo

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Test code
        run: make test
